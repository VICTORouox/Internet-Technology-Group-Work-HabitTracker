{% load static %}
<!DOCTYPE html>
<html lang="zh" class="{% block html_class %}{% endblock %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Habit Tracker{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/aura-theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">

    {% block extra_head %}{% endblock %}
</head>

<body class="h-screen w-screen overflow-hidden bg-[#F7F8F6] text-[#1A1C19]{% block body_class %}{% endblock %}">

<div class="aura-ambient-glow"></div>

<!-- Skip to main content link for keyboard users -->
<a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:bg-green-700 focus:text-white focus:p-2 focus:z-50">
    Skip to main content
</a>

<!-- 全站统一导航栏 -->
{% if request.path != '/login/' and request.path != '/register/' %}
    <header class="aura-header" role="banner">
        <a href="{% url 'logout' %}" class="nav-logout-link" aria-label="Log out">
            <i data-lucide="arrow-left" aria-hidden="true"></i>
            <span>Log out</span>
        </a>
        {% include "partials/navbar.html" %}
    </header>
{% endif %}

<main id="main-content">
    {% block content %}{% endblock %}
</main>

<script>
    lucide.createIcons();
</script>

<script src="{% static 'js/auth-handler.js' %}"></script>

<script>
function scrollHabits(direction) {
    const container = document.getElementById('habitContainer');
    if (!container) return;
    const scrollAmount = container.clientWidth / 3 + 20;

    if (direction === 'left') {
        container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
    } else {
        container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
    }
}
</script>

</body>
</html>
