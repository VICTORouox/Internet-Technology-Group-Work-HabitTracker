{% extends "base.html" %}
{% load static %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/history.css' %}">
{% endblock %}

{% block content %}
<div class="aura-page-wrapper">
    
    <header class="aura-header">
        <a href="{% url 'logout' %}" class="nav-logout-link">
            <i data-lucide="arrow-left"></i>
            <span>Log out</span>
        </a>

        {% include 'partials/navbar.html' %}
    </header>

    <main class="aura-main-content">
        <h1 class="serif text-4xl font-medium mb-10">Habit History</h1>
        <div class="glass-panel !p-8">
            <p>Your habit records will appear here...</p>
        </div>
    </main>
</div>
{% endblock %}
