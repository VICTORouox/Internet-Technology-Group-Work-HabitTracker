{% extends "base.html" %}
{% load static %}

{% block title %}Create Habit{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/create.css' %}">
{% endblock %}

{% block content %}

<div class="create-page">

    <div class="create-card">

        <h1>Create New Habit</h1>
        <p>Choose your sport and intensity level to start building consistency.</p>

        <form method="POST" action="{% url 'save_habit' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Habit Name</label>

                <div class="habit-combined">
                    <input type="text"
                           name="habit_name"
                           placeholder="Enter your habit name"
                           class="habit-input"
                           required>

                    <select name="sport_type"
                            class="habit-select"
                            required>

                        <option value="">Select</option>
                        <option value="Running">Running</option>
                        <option value="Cycling">Cycling</option>
                        <option value="Swimming">Swimming</option>
                        <option value="Yoga">Yoga</option>
                        <option value="Rope Skipping">Rope Skipping</option>
                        <option value="Strength Training">Strength Training</option>
                        <option value="HIIT">HIIT</option>
                        <option value="Brisk Walking">Brisk Walking</option>

                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Intensity Level</label>

                <select name="duration" class="intensity-select">
                    <option value="30 mins">Level 1 (30 mins)</option>
                    <option value="40 mins">Level 2 (40 mins)</option>
                    <option value="50 mins">Level 3 (50 mins)</option>
                    <option value="60 mins">Level 4 (60 mins)</option>
                    <option value="70 mins">Level 5 (70 mins)</option>
                </select>
            </div>

            <button type="submit" class="create-btn">
                Create Habit
            </button>

        </form>

    </div>

</div>

<!-- 重复检测弹窗 -->
{% if duplicate %}
<script>

let message = "";

{% if duplicate_type == "name" %}
message = "This habit name already exists. Create anyway?";
{% else %}
message = "You already have another habit for this sport. Create anyway?";
{% endif %}

if(confirm(message)){

    const form = document.querySelector("form");

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "force_create";
    input.value = "true";

    form.appendChild(input);
    form.submit();
}

</script>
{% endif %}

{% endblock %}
